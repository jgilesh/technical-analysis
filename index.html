const OR="#F5853F", RD="#D94F2A", GR="#0D9E6E", GD="#C4A460", PU="#7C5CBF", BL="#2A7ED4";
const DK="#1a1108", CA="#fffcf7", BD="#e8ddd0";

/* ─────────────────────────────────────────
   SVG CANDLESTICK CHART PRIMITIVES
───────────────────────────────────────── */

// Draw a single candle: cx=center x, top=wick top, open, close, low=wick bottom
function Candle({ cx, wickTop, bodyTop, bodyBot, wickBot, bullish, w=10 }) {
  const fill = bullish ? "#e8faf3" : "#fff0ee";
  const stroke = bullish ? GR : RD;
  return (
    <g>
      <line x1={cx} y1={wickTop} x2={cx} y2={bodyTop} stroke={stroke} strokeWidth="1.5"/>
      <rect x={cx - w/2} y={bodyTop} width={w} height={Math.max(2, bodyBot - bodyTop)}
        fill={fill} stroke={stroke} strokeWidth="1.5" rx="1"/>
      <line x1={cx} y1={bodyBot} x2={cx} y2={wickBot} stroke={stroke} strokeWidth="1.5"/>
    </g>
  );
}

function ChartFrame({ width=320, height=130, children, label }) {
  return (
    <div style={{background:"#1a1108",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px",marginTop:"8px"}}>
      {label && <div style={{fontSize:"0.6rem",fontWeight:"700",letterSpacing:"0.12em",textTransform:"uppercase",
        color:"#9a7a55",marginBottom:"8px"}}>{label}</div>}
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{display:"block",overflow:"visible"}}>
        {children}
      </svg>
    </div>
  );
}

/* ── RSI Chart ── */
function RSIChart() {
  // Price chart top, RSI line bottom
  const candles = [
    {cx:22, wt:22, bt:28, bb:40, wb:44, bull:false},
    {cx:44, wt:28, bt:34, bb:46, wb:50, bull:false},
    {cx:66, wt:36, bt:42, bb:54, wb:58, bull:false},
    {cx:88, wt:46, bt:52, bb:64, wb:68, bull:true},   // RSI oversold, turning up
    {cx:110,wt:40, bt:46, bb:56, wb:60, bull:true},
    {cx:132,wt:30, bt:36, bb:46, wb:50, bull:true},
    {cx:154,wt:20, bt:26, bb:36, wb:40, bull:true},
    {cx:176,wt:14, bt:18, bb:30, wb:34, bull:true},
    {cx:198,wt:10, bt:14, bb:24, wb:28, bull:false},
    {cx:220,wt:8,  bt:12, bb:22, wb:26, bull:true},
  ];
  // RSI line points (y scaled: 70=rsiTop, 130=rsiBot; 0=130, 100=70)
  const rsiTop=75, rsiBotLine=125;
  const scaleRSI = v => rsiTop + ((100-v)/100)*(rsiBotLine-rsiTop);
  const rsiVals = [68,60,42,28,35,48,58,65,62,68];
  const rsiPts  = rsiVals.map((v,i)=>({x:[22,44,66,88,110,132,154,176,198,220][i], y:scaleRSI(v)}));
  const pathD   = rsiPts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const ob = scaleRSI(70), os = scaleRSI(30), mid = scaleRSI(50);
  return (
    <ChartFrame width={258} height={140} label="RSI — drops to oversold, then turns upward as price recovers">
      {/* Price candles */}
      {candles.map((c,i)=>(<Candle key={i} cx={c.cx} wickTop={c.wt} bodyTop={c.bt} bodyBot={c.bb} wickBot={c.wb} bullish={c.bull}/>))}
      {/* Divider */}
      <line x1={8} y1={68} x2={250} y2={68} stroke="#3a2a18" strokeWidth="1"/>
      {/* RSI zones */}
      <rect x={8} y={rsiTop} width={242} height={ob-rsiTop} fill="#ff000010" rx="2"/>
      <rect x={8} y={os}     width={242} height={rsiBotLine-os} fill="#00ff0010" rx="2"/>
      <line x1={8} y1={ob}  x2={250} y2={ob}  stroke={RD} strokeWidth="0.8" strokeDasharray="3 2"/>
      <line x1={8} y1={mid} x2={250} y2={mid} stroke="#9a7a55" strokeWidth="0.8" strokeDasharray="2 2"/>
      <line x1={8} y1={os}  x2={250} y2={os}  stroke={GR} strokeWidth="0.8" strokeDasharray="3 2"/>
      <text x={10} y={ob-3}  fontSize="7" fill={RD}>70</text>
      <text x={10} y={mid-3} fontSize="7" fill="#9a7a55">50</text>
      <text x={10} y={os-3}  fontSize="7" fill={GR}>30</text>
      {/* RSI line */}
      <path d={pathD} fill="none" stroke={OR} strokeWidth="2"/>
      {/* Oversold dot */}
      <circle cx={88} cy={scaleRSI(28)} r="4" fill={GR}/>
      <text x={92} y={scaleRSI(28)+3} fontSize="7" fill={GR}>Oversold</text>
    </ChartFrame>
  );
}

/* ── MACD Chart ── */

  const candles = [

  const mBase = 135, mMid = 108;
  const macdLine   = [[22,118],[44,116],[66,115],[88,110],[110,104],[132,100],[154,98],[176,97],[198,98],[220,97]];
  const signalLine = [[22,120],[44,119],[66,117],[88,113],[110,107],[132,102],[154,100],[176,98],[198,98],[220,97]];
  const histHeights= [-2,-3,-2, 3,  3,   2,   2,   1,   0,   0];
  const toPath = pts => pts.map((p,i)=>`${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ");
  return (
    <ChartFrame width={258} height={148} label="MACD — bullish crossover confirms upward momentum">

      {/* Histogram */}
      {histHeights.map((h,i)=>{
        const cx=[22,44,66,88,110,132,154,176,198,220][i];
        const isPos = h>=0;
        return <rect key={i} x={cx-5} y={isPos?mMid-h*3:mMid} width={10}
          height={Math.abs(h)*3} fill={isPos?GR:RD} rx="1" opacity="0.7"/>;
      })}
      {/* Lines */}
      <path d={toPath(macdLine)}   fill="none" stroke={BL} strokeWidth="1.8"/>
      <path d={toPath(signalLine)} fill="none" stroke={OR} strokeWidth="1.5" strokeDasharray="3 2"/>
      <text x={10} y={97}  fontSize="7" fill={BL}>MACD</text>
      <text x={10} y={106} fontSize="7" fill={OR}>Signal</text>
      {/* Crossover marker */}
      <circle cx={88} cy={110} r="4" fill="none" stroke={GR} strokeWidth="1.5"/>
      <text x={78} y={144} fontSize="7" fill={GR}>✓ Crossover</text>
    </ChartFrame>
  );
}

function TabKeyLevels({ onNext }) {
  return (
    <div className="fu">
      <DarkCallout eyebrow="Key Levels">
        Key levels are price zones where the market has repeatedly paused, reversed, or broken through. Learning to spot them is the single most important charting skill for an options trader.
      </DarkCallout>
      <InfoBox accent={OR}>
        <strong>How to use them:</strong> Key levels aren't exact prices — they're zones. Price rarely respects a level to the penny, so think of each one as an area, not a line. The more times a level gets tested and holds, the more weight it carries, and the more traders are likely watching that same zone.
      </InfoBox>

      <SectionLabel label="The Five Key Levels" sub="Tap each to expand" />

      <ExpandableCard title="Support" accent={GR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A price zone where buying pressure has historically stopped a stock from falling further — a floor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> If a stock approaches strong support, it may bounce — a potential entry for a call contract.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Look for at least two separate touches where price dropped to roughly the same area and turned back up. The more times it holds, the more traders are watching it, which makes the bounce more reliable.
        </div>
        <SupportChart />
        <RuleBox rule="Mark support levels before looking for entry signals. Price approaching support is not a trade — it's a zone to watch." />
        <FlagRow
          green={["Level tested 2+ times and held","Volume drops as price nears support","Bullish candle pattern forms at the level"]}
          red={["Prior breakdown through this level on high volume","Multiple failed bounces recently","Strong downtrend still in place"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Resistance" accent={RD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A price zone where selling pressure has repeatedly stopped a stock from moving higher — a ceiling.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Stocks pressing against resistance may stall or reverse. This is where calls lose steam and puts gain it.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Look for at least two separate touches where price rose to roughly the same area and turned back down. Each rejection adds weight to the level — the third or fourth test is often the one that finally breaks it.
        </div>
        <ResistanceChart />
        <RuleBox rule="Never enter a call trade when price is already pressing against major resistance. Wait for a confirmed breakout above it first." />
        <FlagRow
          green={["Level is well-defined with 2+ touches","Price is consolidating well below resistance","Volume is low near the resistance zone"]}
          red={["Price is already at or above resistance","Bearish candle patterns forming at the level","Resistance tested 4+ times without a break"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Breakout" accent={OR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> When price moves decisively above a resistance level, confirming that buyers have taken control. The old ceiling becomes the new floor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> A confirmed breakout is one of the strongest entry signals for a call contract — price has room to run.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Price has tested resistance multiple times without breaking it, then suddenly closes above it with a larger candle body than usual. The size of the candle and the volume behind it tell you whether buyers are serious or just testing the water.
        </div>
        <BreakoutChart />
        <RuleBox rule="Wait for the candle to close above resistance — not just wick above it. A full candle close above the level on high volume is the confirmation." />
        <FlagRow
          green={["Candle closes above resistance on high volume","Volume is 1.5× the 20-day average or more","Price retests old resistance as new support"]}
          red={["Wick above resistance but close below (false breakout)","Low volume on the breakout candle","Broad market selling off on the same day"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Breakdown" accent={PU}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> When price moves decisively below a support level, confirming that sellers have taken control. The old floor becomes the new ceiling.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> A confirmed breakdown signals downside — a warning to exit existing call positions or consider puts.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Price has held above support multiple times, then suddenly closes below it with a larger candle body than usual. Watch for the same level that used to act as a floor flipping into a ceiling on the next bounce attempt.
        </div>
        <BreakdownChart />
        <RuleBox rule="If your stock breaks down below a key support level on high volume, exit first and ask questions later. Do not hold and hope." />
        <FlagRow
          green={["Candle closes below support on high volume","Old support now acting as resistance","Multiple failed attempts to reclaim support"]}
          red={["Price dipped below but quickly recovered","Low volume on the breakdown candle","Broader market rallying on the same day"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Trend Lines" accent={GD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A diagonal line connecting a series of higher lows (uptrend) or lower highs (downtrend). It shows the direction and slope of price movement over time.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Trading with the trend improves your probability significantly. Trend lines help you visualize whether price is moving in your favor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Connect at least two or three swing lows (in an uptrend) or swing highs (in a downtrend) with a straight line. A trend line only becomes meaningful once price has touched and respected it more than once — a single connection is just a guess.
        </div>
        <TrendLineChart />
        <RuleBox rule="Identify the trend direction before looking for an entry. Trading against the trend is possible — but it's swimming upstream." />
        <FlagRow
          green={["Higher highs and higher lows in sequence","Trend line tested and held 2+ times","Volume increasing in the trend direction"]}
          red={["Trend line has been broken","Price is choppy with no clear direction","Multiple failed attempts to resume the trend"]}
        />
      </ExpandableCard>

      <NextBtn label="Indicators" onClick={onNext} />
    </div>
  );
}

      <ExpandableCard title="Moving Averages (50 MA / 200 MA)" accent={GD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A line that plots the average closing price over a set number of periods. The 50 MA averages the last 50 days. The 200 MA averages the last 200 days. Both overlay directly on the price chart.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> When price is above its MA, the trend is up. When price is below, the trend is down. MAs also act as dynamic support and resistance levels.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> A 50 MA reacts faster to recent price than a 200 MA, which shifts only slowly over time. When price stays above a moving average for a sustained stretch, that average tends to flatten out and rise, confirming the trend.
        </div>
        <MAChart />
        <RuleBox rule="[Placeholder — to be confirmed.] Example: Prefer call setups where price is above both the 50 MA and 200 MA. A 50 MA crossover above the 200 MA (Golden Cross) signals a strong uptrend." />
        <FlagRow
          green={["Price trading above both 50 MA and 200 MA","50 MA recently crossed above 200 MA (Golden Cross)","Price pulling back to 50 MA and bouncing"]}
          red={["Price trading below the 200 MA","50 MA crossed below 200 MA (Death Cross)","Price failed to reclaim 50 MA after a breakdown"]}
        />
      </ExpandableCard>

      <ExpandableCard title="MACD" accent={PU}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> Moving Average Convergence Divergence. A momentum indicator showing the relationship between two moving averages. Displayed below the chart as two lines and a histogram.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> MACD signals when momentum is building or fading. A bullish crossover — the fast line crossing above the slow line — is a common confirmation for entries.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> The MACD line reacts faster to price than the signal line. When the two lines are far apart, momentum is strong. When they converge or cross, momentum is shifting — that crossover is the moment most traders watch for.
        </div>
        <MACDChart />
        <RuleBox rule="[Placeholder — to be confirmed.] Example: Use MACD as a confirming indicator only. Look for a bullish crossover to confirm a call entry you've already identified on price action." />
        <FlagRow
          green={["MACD line crossed above signal line","Histogram bars turning green and growing","Crossover happening above the zero line"]}
          red={["MACD line crossed below signal line","Histogram bars shrinking after a long run","Price up but MACD falling (divergence)"]}
        />
      </ExpandableCard>

    </div>
  );
}
