   SVG CANDLESTICK CHART PRIMITIVES
───────────────────────────────────────── */

// Draw a single candle: cx=center x, top=wick top, open, close, low=wick bottom
function Candle({ cx, wickTop, bodyTop, bodyBot, wickBot, bullish, w=10 }) {
  const fill = bullish ? "#e8faf3" : "#fff0ee";
  const stroke = bullish ? GR : RD;
  return (
    <g>
      <line x1={cx} y1={wickTop} x2={cx} y2={bodyTop} stroke={stroke} strokeWidth="1.5"/>
      <rect x={cx - w/2} y={bodyTop} width={w} height={Math.max(2, bodyBot - bodyTop)}
        fill={fill} stroke={stroke} strokeWidth="1.5" rx="1"/>
      <line x1={cx} y1={bodyBot} x2={cx} y2={wickBot} stroke={stroke} strokeWidth="1.5"/>
    </g>
  );
}

function ChartFrame({ width=320, height=130, children, label }) {
  return (
    <div style={{background:"#1a1108",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px",marginTop:"8px"}}>
      {label && <div style={{fontSize:"0.6rem",fontWeight:"700",letterSpacing:"0.12em",textTransform:"uppercase",
        color:"#9a7a55",marginBottom:"8px"}}>{label}</div>}
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{display:"block",overflow:"visible"}}>
        {children}
      </svg>
    </div>
  );
}

/* ── Shared pattern-overlay helper ──
   Computes a zigzag line through the actual swing high/low of every candle.
   This is the single source of truth used by every Chart Patterns diagram —
   never hand-typed separately, so the line can't drift from the candle data.
   mode "peak" (default): for patterns built around tops (Head & Shoulders, Double Top).
     Compares each candle's wick-top to its neighbors — local peak uses the top,
     local valley uses the bottom, mid-slope points follow the incoming direction.
   mode "valley": mirrors the same logic using wick-bottom, for patterns built
     around dips (Inverse Head & Shoulders, Double Bottom). */
function zigzagPoints(candles, mode = "peak") {
  if (mode === "valley") {
    return candles.map((c, i) => {
      const prev = candles[i - 1];
      const next = candles[i + 1];
      let useBottom;
      if (!prev) useBottom = c.wb < next.wb;
      else if (!next) useBottom = c.wb > prev.wb;
      else if (c.wb > prev.wb && c.wb >= next.wb) useBottom = true;
      else if (c.wb < prev.wb && c.wb <= next.wb) useBottom = false;
      else useBottom = c.wb > prev.wb;
      return { cx: c.cx, y: useBottom ? c.wb : c.wt };
    });
  }
  return candles.map((c, i) => {
    const prev = candles[i - 1];
    const next = candles[i + 1];
    let useTop;
    if (!prev) useTop = c.wt > next.wt;
    else if (!next) useTop = c.wt < prev.wt;
    else if (c.wt < prev.wt && c.wt <= next.wt) useTop = true;
    else if (c.wt > prev.wt && c.wt >= next.wt) useTop = false;
    else useTop = c.wt < prev.wt;
    return { cx: c.cx, y: useTop ? c.wt : c.wb };
  });
}
function zigzagPathStr(points) {
  return points.map(p => `${p.cx},${p.y}`).join(" ");
}
// Finds the N most extreme local peaks (or valleys) in a candle array, sorted left-to-right.
// type "peak" = local maxima on wick-top (lowest y); "valley" = local minima on wick-bottom (highest y).
function findExtremes(candles, type, count) {
  const found = candles.filter((c, i) => {
    if (i === 0 || i === candles.length - 1) return false;
    if (type === "peak") return c.wt < candles[i-1].wt && c.wt < candles[i+1].wt;
    return c.wb > candles[i-1].wb && c.wb > candles[i+1].wb;
  });
  const sorted = [...found].sort((a, b) => type === "peak" ? a.wt - b.wt : b.wb - a.wb);
  return sorted.slice(0, count).sort((a, b) => a.cx - b.cx);
}

          <div style={{flex:1,minWidth:"140px",fontSize:"0.75rem",color:"#5a4535",lineHeight:"1.6",paddingTop:"4px"}}>

        {[
          {label:"Body",      color:GR,        desc:"The filled or hollow rectangle showing the range between open and close. Hollow = price moved up (bullish). Filled = price moved down (bearish)."},
          {label:"Upper wick",color:"#8a7560", desc:"The thin line above the body, connecting the close (or open) up to the high. Shows how far price pushed up beyond the body."},

      <ExpandableCard title="Candlestick Patterns" accent={OR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"12px"}}>
          Beyond a single body and wick, certain candle shapes repeat often enough that traders give them names. Each one tells a quick story about who was in control during that period.

        <div style={{display:"flex",gap:"16px",alignItems:"center",background:"#fef9f0",borderRadius:"9px",padding:"12px",marginBottom:"10px"}}>

            <line x1="30" y1="6" x2="30" y2="74" stroke={GD} strokeWidth="2"/>

            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55"}}><strong style={{color:DK}}>What it means:</strong> A potential bullish reversal signal. It shows buyers rejecting lower prices, which carries the most weight after a downtrend or at a support level.</div>

        </div>

        {/* Shooting Star */}
        <div style={{display:"flex",gap:"16px",alignItems:"center",background:"#fff5f5",borderRadius:"9px",padding:"12px",marginBottom:"10px"}}>
          <svg width="60" height="80" viewBox="0 0 60 80" style={{flexShrink:0}}>

            <div style={{fontWeight:"700",fontSize:"0.82rem",color:DK,marginBottom:"3px"}}>Shooting Star</div>

            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55"}}><strong style={{color:DK}}>What it means:</strong> A potential bearish reversal signal. It shows sellers rejecting higher prices, which carries the most weight after an uptrend or at a resistance level.</div>
          </div>
        </div>

        {/* Spinning Top */}
        <div style={{display:"flex",gap:"16px",alignItems:"center",background:"#f5f0ff",borderRadius:"9px",padding:"12px",marginBottom:"10px"}}>
          <svg width="60" height="80" viewBox="0 0 60 80" style={{flexShrink:0}}>
            <line x1="30" y1="6" x2="30" y2="32" stroke={PU} strokeWidth="2.5"/>
            <rect x="20" y="32" width="20" height="16" rx="2" fill="#f0ebfa" stroke={PU} strokeWidth="2"/>
            <line x1="30" y1="48" x2="30" y2="74" stroke={PU} strokeWidth="2.5"/>
          </svg>
          <div>
            <div style={{fontWeight:"700",fontSize:"0.82rem",color:DK,marginBottom:"3px"}}>Spinning Top</div>
            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55",marginBottom:"5px"}}>Small body with wicks of similar length on both sides — more total movement during the period than a doji, just no clear winner.</div>
            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55"}}><strong style={{color:DK}}>What it means:</strong> Indecision, like a doji. Buyers and sellers both pushed hard, but neither one controlled the close. Worth watching what the next candle does.</div>
          </div>
        </div>

        {/* Marubozu */}
        <div style={{display:"flex",gap:"16px",alignItems:"center",background:"#eef6fb",borderRadius:"9px",padding:"12px",marginBottom:"6px"}}>
          <svg width="60" height="80" viewBox="0 0 60 80" style={{flexShrink:0}}>
            <rect x="20" y="6" width="20" height="68" rx="2" fill="#e6f2fa" stroke={BL} strokeWidth="2.5"/>
          </svg>
          <div>
            <div style={{fontWeight:"700",fontSize:"0.82rem",color:DK,marginBottom:"3px"}}>Marubozu</div>
            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55",marginBottom:"5px"}}>A candle with almost no wicks — the body spans nearly the entire high-to-low range. A bullish Marubozu opens at the low and closes at the high. A bearish Marubozu opens at the high and closes at the low.</div>
            <div style={{fontSize:"0.76rem",color:"#5a4535",lineHeight:"1.55"}}><strong style={{color:DK}}>What it means:</strong> The opposite of indecision. One side was in complete control for the entire period with no real pushback — strong buying conviction on a bullish Marubozu, strong selling conviction on a bearish one.</div>
          </div>
        </div>

      </ExpandableCard>

      <ExpandableCard title="Chart Types" accent={BL}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"10px"}}>
          Price data can be displayed in a few different ways. Each one uses the same underlying open, high, low, and close — just presented differently.
        </div>

        <div style={{display:"flex",gap:"14px",alignItems:"center",background:CA,border:`1px solid ${BD}`,borderRadius:"9px",padding:"12px",marginBottom:"8px"}}>
          <svg width="80" height="60" viewBox="0 0 80 60" style={{flexShrink:0}}>
            <polyline points="6,40 20,32 34,38 48,18 62,24 74,8" fill="none" stroke={BL} strokeWidth="2.5"/>
          </svg>
          <div>
            <div style={{fontWeight:"700",fontSize:"0.8rem",color:DK,marginBottom:"3px"}}>Line Chart</div>
            <div style={{fontSize:"0.75rem",color:"#5a4535",lineHeight:"1.55"}}>Connects each period's closing price with a single line. Simple and clean, but it leaves out the open, high, and low entirely.</div>
          </div>
        </div>

        <div style={{display:"flex",gap:"14px",alignItems:"center",background:CA,border:`1px solid ${BD}`,borderRadius:"9px",padding:"12px",marginBottom:"8px"}}>
          <svg width="80" height="60" viewBox="0 0 80 60" style={{flexShrink:0}}>
            {[[14,10,40,GR],[34,16,46,RD],[54,6,36,GR]].map(([x,top,bot,col],i)=>(
              <g key={i}>
                <line x1={x} y1={top} x2={x} y2={bot} stroke={col} strokeWidth="2"/>
                <line x1={x-5} y1={top+6} x2={x} y2={top+6} stroke={col} strokeWidth="2"/>
                <line x1={x} y1={bot-6} x2={x+5} y2={bot-6} stroke={col} strokeWidth="2"/>
              </g>
            ))}
          </svg>
          <div>
            <div style={{fontWeight:"700",fontSize:"0.8rem",color:DK,marginBottom:"3px"}}>Bar Chart (OHLC)</div>
            <div style={{fontSize:"0.75rem",color:"#5a4535",lineHeight:"1.55"}}>A vertical line for the high-low range, with small tick marks on the left for open and on the right for close. More detail than a line chart, but slower to read at a glance.</div>
          </div>
        </div>

        <div style={{display:"flex",gap:"14px",alignItems:"center",background:CA,border:`1px solid ${BD}`,borderRadius:"9px",padding:"12px",marginBottom:"6px"}}>
          <svg width="80" height="60" viewBox="0 0 80 60" style={{flexShrink:0}}>
            {[[16,8,18,38,46,true],[38,14,26,40,48,false],[60,4,16,30,40,true]].map(([x,wt,bt,bb,wb,bull],i)=>(
              <PatternCandle key={i} cx={x} wickTop={wt} bodyTop={bt} bodyBot={bb} wickBot={wb} bullish={bull}/>
            ))}
          </svg>
          <div>
            <div style={{fontWeight:"700",fontSize:"0.8rem",color:DK,marginBottom:"3px"}}>Candlestick Chart</div>
            <div style={{fontSize:"0.75rem",color:"#5a4535",lineHeight:"1.55"}}>The same open, high, low, and close as a bar chart, but shown as a body with wicks. This is the format used throughout the rest of this module.</div>
          </div>
        </div>
      </ExpandableCard>

      <ExpandableCard title="Timeframes" accent={PU}>
        <div style={{fontSize:"0.84rem",color:"#5a4535",lineHeight:"1.7",marginBottom:"12px"}}>
          Every timeframe is a different lens on the same stock. A monthly chart and a 15-minute chart are showing you the same price — just at different levels of zoom. Understanding what each lens reveals is what lets you build a complete picture before making any decision.
        </div>
        {[
          {label:"Monthly", tag:"Widest view", color:PU, desc:"One candle = one month of price action. Shows the longest-term trend and the most significant support and resistance levels — zones that have held or broken over years. These levels carry the most weight because the most people are watching them."},
          {label:"Weekly",  tag:"Big picture", color:BL, desc:"One candle = one week. Confirms the intermediate trend and shows where price has spent meaningful time. Weekly levels are widely watched by institutional traders, making them reliable reference points."},
          {label:"Daily",   tag:"The standard", color:OR, desc:"One candle = one trading day. The most commonly referenced timeframe for identifying trends, marking key levels, and reading price action. Most chart analysis starts and ends here."},
          {label:"4H / 1H", tag:"Medium zoom", color:GD, desc:"One candle = 4 hours or 1 hour. Shows how price is moving within the context of the daily trend. Useful for seeing momentum building or fading between daily candles."},
          {label:"15M and below", tag:"Short zoom", color:RD, desc:"One candle = 15 minutes or less. High detail, high noise. These timeframes capture micro-movements that can look significant but often aren't. More data doesn't always mean more clarity."},
        ].map((tf,i)=>(
          <div key={i} style={{background:CA,border:`1px solid ${BD}`,borderLeft:`3px solid ${tf.color}`,
            borderRadius:"9px",padding:"12px 14px",marginBottom:"7px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>

              <span style={{fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.1em",textTransform:"uppercase",
                color:tf.color,background:`${tf.color}18`,borderRadius:"4px",padding:"2px 6px"}}>{tf.tag}</span>
            </div>
            <div style={{fontSize:"0.77rem",color:"#5a4535",lineHeight:"1.6"}}>{tf.desc}</div>
          </div>
        ))}
      </ExpandableCard>

      <NextBtn label="Key Levels" onClick={onNext} />
    </div>
  );
}

/* ══════════════════════════════════════════
   TAB 2 — KEY LEVELS
══════════════════════════════════════════ */
function TabKeyLevels({ onNext }) {
  return (
    <div className="fu">
      <DarkCallout eyebrow="Key Levels">
        Key levels are price zones where the market has repeatedly paused, reversed, or broken through. Learning to spot them is the single most important charting skill for an options trader.
      </DarkCallout>
      <InfoBox accent={OR}>
        <strong>How to use them:</strong> Key levels aren't exact prices — they're zones. Price rarely respects a level to the penny, so think of each one as an area, not a line. The more times a level gets tested and holds, the more weight it carries, and the more traders are likely watching that same zone.
      </InfoBox>

      <SectionLabel label="The Five Key Levels" sub="Tap each to expand" />

      <ExpandableCard title="Support" accent={GR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A price zone where buying pressure has historically stopped a stock from falling further — a floor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> If a stock approaches strong support, it may bounce, favoring a call. If it breaks down through support instead, that favors a put. The level itself is what to watch — which direction it resolves determines the trade.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Look for at least two separate touches where price dropped to roughly the same area and turned back up. The more times it holds, the more traders are watching it, which makes the bounce more reliable.
        </div>
        <SupportChart />
        <WhatToLookFor
          bullish={["Level tested 2+ times and held","Volume drops as price nears support","Bullish candle pattern forms at the level"]}
          bearish={["Prior breakdown through this level on high volume","Multiple failed bounces recently","Strong downtrend still in place"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Resistance" accent={RD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A price zone where selling pressure has repeatedly stopped a stock from moving higher — a ceiling.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Stocks pressing against resistance may stall or reverse, favoring a put. If price breaks through instead, that favors a call. The level itself is what to watch — which direction it resolves determines the trade.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Look for at least two separate touches where price rose to roughly the same area and turned back down. Each rejection adds weight to the level — the third or fourth test is often the one that finally breaks it.
        </div>
        <ResistanceChart />
        <WhatToLookFor
          bearish={["Level is well-defined with 2+ touches","Price is consolidating well below resistance","Volume is low near the resistance zone"]}
          bullish={["Price is already at or above resistance","Bullish candle patterns forming at the level","Resistance tested 4+ times without a break"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Breakout" accent={OR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> When price moves decisively above a resistance level, confirming that buyers have taken control. The old ceiling becomes the new floor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> A confirmed breakout is one of the strongest entry signals for a call contract — price has room to run.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Price has tested resistance multiple times without breaking it, then suddenly closes above it with a larger candle body than usual. The size of the candle and the volume behind it tell you whether buyers are serious or just testing the water.
        </div>
        <BreakoutChart />
        <InfoBox accent={OR}>
          <strong>Consolidation:</strong> Notice the tighter candles sitting just below resistance before the breakout. That narrow, sideways squeeze is consolidation — price coiling in a small range as buyers and sellers fight it out near the level. A breakout that comes after real consolidation tends to be more reliable than one that comes out of nowhere, since it shows pressure building before the move.
        </InfoBox>
        <FlagRow
          green={["Candle closes above resistance on high volume","Volume is 1.5× the 20-day average or more","Price retests old resistance as new support"]}
          red={["Wick above resistance but close below (false breakout)","Low volume on the breakout candle","Broad market selling off on the same day"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Breakdown" accent={PU}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> When price moves decisively below a support level, confirming that sellers have taken control. The old floor becomes the new ceiling.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> A confirmed breakdown signals downside — a warning to exit existing call positions or consider puts.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Price has held above support multiple times, then suddenly closes below it with a larger candle body than usual. Watch for the same level that used to act as a floor flipping into a ceiling on the next bounce attempt.
        </div>
        <BreakdownChart />
        <InfoBox accent={PU}>
          <strong>Consolidation:</strong> The same tight, sideways squeeze that precedes a breakout can also precede a breakdown. When candles narrow just above support, it's a sign of pressure building near the level — keep an eye on which direction it eventually resolves.
        </InfoBox>
        <FlagRow
          green={["Candle closes below support on high volume","Old support now acting as resistance","Multiple failed attempts to reclaim support"]}
          red={["Price dipped below but quickly recovered","Low volume on the breakdown candle","Broader market rallying on the same day"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Trend Lines" accent={GD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A diagonal line connecting a series of higher lows (uptrend) or lower highs (downtrend). It shows the direction and slope of price movement over time.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Trading with the trend improves your probability significantly. Trend lines help you visualize whether price is moving in your favor.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How to spot it:</strong> Connect at least two or three swing lows (in an uptrend) or swing highs (in a downtrend) with a straight line. A trend line only becomes meaningful once price has touched and respected it more than once — a single connection is just a guess.
        </div>
        <TrendLineChart />
        <WhatToLookFor
          bullish={["Higher highs and higher lows in sequence","An ascending trend line tested and held 2+ times","Volume increasing as price climbs"]}
          bearish={["Lower highs and lower lows in sequence","A descending trend line tested and held 2+ times","Volume increasing as price falls"]}
          other={["The trend line breaking, in either direction, signals the trend may be ending","Choppy price with no clear sequence of highs or lows means there's no real trend line to draw yet"]}
        />
      </ExpandableCard>

      <SectionLabel label="The Flip" sub="A broken level often swaps roles" />
      <div style={{fontSize:"0.84rem",color:"#5a4535",lineHeight:"1.7",marginBottom:"4px"}}>
        Break a ceiling and it often becomes the new floor. Lose a floor and it often becomes the new ceiling. The level doesn't disappear once it breaks — the traders who were watching it are still watching it, just from the other side. Everyone who bought right at the breakout doesn't want to be underwater, so they tend to buy again if price comes back down to retest that same level. Watch for that retest after a break — it's often the cleanest confirmation that the level has actually flipped.
      </div>
      <FlipChart />

      <SectionLabel label="Trending vs. Ranging Markets" sub="The condition behind every level" />
      <div style={{fontSize:"0.84rem",color:"#5a4535",lineHeight:"1.7",marginBottom:"4px"}}>
        Not every stock is trending. A trending market makes a clear sequence of higher highs and higher lows (or lower highs and lower lows) — this is where trend lines apply. A ranging market moves sideways between a fairly fixed support and resistance, with no clear higher highs or lower lows forming. Recognizing which condition you're in matters just as much as spotting the levels themselves — it tells you whether you should be drawing a trend line or watching a support/resistance bounce.
      </div>
      <TrendingVsRangingChart />

      <NextBtn label="Indicators" onClick={onNext} />
    </div>
  );
}

/* ══════════════════════════════════════════

function TabIndicators({ onNext }) {
  return (
    <div className="fu">
      <DarkCallout eyebrow="Indicators">
        Indicators are tools you layer on top of a price chart. They take the raw price and volume data from the candles and run it through a formula — then display the result as a line, a histogram, or a scale directly on or below your chart. They don't add new information. They organize the information that's already there into a format that's easier to read at a glance.
      </DarkCallout>
      <InfoBox accent={OR}>
        <strong>How to use them:</strong> Every indicator is a secondary signal, not a primary one. The candles tell you what price is doing. Indicators help you measure how strong or weak that move is. Use them to confirm what you're already seeing, not to find a trade you wouldn't have spotted otherwise.
      </InfoBox>

      <SectionLabel label="The Indicators" sub="Tap each to expand" />

      <ExpandableCard title="Volume" accent={BL}>

          <strong>What it is:</strong> The number of shares traded during a given period. Displayed as bars at the bottom of every chart, below the candles.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Price moves on high volume are more significant than moves on low volume. A breakout with high volume is real. A breakout with low volume is suspect.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> Volume bars rise and fall with each candle. A normal day might show volume near its 20-day average. Spikes happen on news, earnings, or when a key level breaks. Low volume on a big price move often means low conviction behind it.
        </div>
        <VolumeChart />
        <WhatToLookFor items={[
          "Breakout or breakdown candle has 1.5× average volume or more — the move has real participation behind it",
          "Volume increasing steadily in whichever direction price is moving — confirms the move",
          "Volume declining while price keeps extending — a warning sign regardless of direction, since the move may be running out of real conviction",
          "A breakout or breakdown on below-average volume — worth treating with caution either way",
        ]} />
      </ExpandableCard>

      <ExpandableCard title="RSI — Relative Strength Index" accent={OR}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A momentum indicator that measures how fast and how much price has moved. Produces a number from 0 to 100, displayed as a line below the chart.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> RSI tells you whether a stock is overbought (due for a pullback) or oversold (due for a bounce) — helping you avoid entering at the worst moment.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> RSI usually oscillates between 30 and 70 during normal market conditions. It rises when a stock has more or stronger up candles recently, and falls when down candles dominate. A sharp drop in RSI signals fading momentum, even if price hasn't reversed yet.
        </div>
        <RSIChart />
        <div style={{background:"#f7f0e6",borderRadius:"9px",padding:"11px 13px",marginBottom:"10px"}}>
          {[
            {range:"70–100",label:"Overbought",color:RD,  desc:"Stock has moved up fast and may be due for a pullback. Worth watching for call exits or put entries."},
            {range:"50–70", label:"Bullish momentum",color:OR,  desc:"Trending up with strength. Favorable territory for call setups."},
            {range:"30–50", label:"Bearish momentum",color:GD,  desc:"Trending down with strength. Favorable territory for put setups."},
            {range:"0–30",  label:"Oversold",color:GR,  desc:"Stock has moved down fast and may be due for a bounce. Worth watching for put exits or call entries."},
          ].map((row,i)=>(
            <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",marginBottom:"7px"}}>
              <div style={{background:row.color,color:"#fff",borderRadius:"5px",padding:"2px 7px",
                fontSize:"0.67rem",fontWeight:"700",whiteSpace:"nowrap",flexShrink:0}}>{row.range}</div>
              <div>
                <span style={{fontWeight:"700",fontSize:"0.75rem",color:DK}}>{row.label} — </span>
                <span style={{fontSize:"0.74rem",color:"#5a4535"}}>{row.desc}</span>
              </div>
            </div>
          ))}
        </div>
        <WhatToLookFor
          bullish={["RSI rising from oversold (below 30)","RSI crossing above 50 after a pullback","RSI confirming a price breakout (both moving up)"]}
          bearish={["RSI falling from overbought (above 70)","RSI crossing below 50 after a bounce","RSI confirming a price breakdown (both moving down)"]}
          other={["Price making new highs while RSI fails to make new highs (or the reverse) — a divergence worth noting regardless of direction"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Moving Averages (50 MA / 200 MA)" accent={GD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A line that plots the average closing price over a set number of periods. The 50 MA averages the last 50 days. The 200 MA averages the last 200 days. Both overlay directly on the price chart.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> When price is above its MA, the trend is up. When price is below, the trend is down. MAs also act as dynamic support and resistance levels.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> A 50 MA reacts faster to recent price than a 200 MA, which shifts only slowly over time. When price stays above a moving average for a sustained stretch, that average tends to flatten out and rise, confirming the trend.
        </div>
        <MAChart />
        <WhatToLookFor
          bullish={["Price trading above both 50 MA and 200 MA","50 MA recently crossed above 200 MA (Golden Cross)","Price pulling back to 50 MA and bouncing"]}
          bearish={["Price trading below both 50 MA and 200 MA","50 MA crossed below 200 MA (Death Cross)","Price failed to reclaim 50 MA after a breakdown"]}
        />
      </ExpandableCard>

      <ExpandableCard title="MACD" accent={PU}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> Moving Average Convergence Divergence. A momentum indicator showing the relationship between two moving averages. Displayed below the chart as two lines and a histogram.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> MACD signals when momentum is building or fading. A crossover — the fast line crossing the slow line — is a common confirmation either direction, depending on which way it crosses.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> The MACD line reacts faster to price than the signal line. When the two lines are far apart, momentum is strong. When they converge or cross, momentum is shifting — that crossover is the moment most traders watch for.
        </div>
        <MACDChart />
        <WhatToLookFor
          bullish={["MACD line crossed above signal line","Histogram bars turning positive and growing","Crossover happening above the zero line"]}
          bearish={["MACD line crossed below signal line","Histogram bars turning negative and growing","Crossover happening below the zero line"]}
          other={["Price making new highs (or lows) while MACD doesn't confirm — a divergence worth noting regardless of direction"]}
        />
      </ExpandableCard>

      <ExpandableCard title="VWAP — Volume Weighted Average Price" accent={GD}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A line plotted directly on the price chart, showing the average price a stock has traded at so far, weighted by volume. It resets at the start of each session and builds throughout the day.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> VWAP acts as a reference point many traders watch closely. Price trading above VWAP is generally viewed as bullish for the session, below as bearish. It also acts as a dynamic support or resistance line.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> VWAP is less reactive than a short moving average since it factors in every trade's volume from the start of the session. It tends to smooth out and drift gradually rather than swinging sharply.
        </div>
        <InfoBox accent={GD}>
          <strong>What you'll see:</strong> Adding VWAP on most platforms shows three lines, not one — the VWAP line itself, plus an upper and lower band. The bands are optional and can be turned off; whether Dominique uses them is still being confirmed.
        </InfoBox>
        <InfoBox accent={GD}>
          <strong>What the bands mean:</strong> They sit a certain distance above and below VWAP, based on standard deviation — how spread out price has been from VWAP so far. The wider that spread, the further apart the bands sit. Price near the upper band is trading rich relative to the session's average; price near the lower band is trading cheap relative to it.
        </InfoBox>
        <InfoBox accent={GD}>
          Because VWAP is a cumulative average — recalculated using every trade from the start of the session onward — the bands tend to start tight, widen through the middle of the day, and tighten again near the close. Early on there isn't much data yet, so there's little deviation to measure. As the session builds, more price swings get factored in and the bands widen. Near the close, VWAP has absorbed a full day of trades and becomes harder for any single new one to shift, so the spread around it often shrinks back down too — tight again, the same way it started.
        </InfoBox>
        <VWAPChart />
        <WhatToLookFor
          bullish={["Price holding above VWAP on a pullback","Price bouncing off VWAP with rising volume","VWAP sloping upward alongside price"]}
          bearish={["Price failing to reclaim VWAP on a bounce attempt","Price rejecting off VWAP with rising volume","VWAP sloping downward alongside price"]}
          other={["Bands are tight near the open and close, and wider mid-session — this reflects how much data has accumulated, not a directional signal"]}
        />
      </ExpandableCard>

      <ExpandableCard title="Buy/Sell Volume" accent={BL}>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>What it is:</strong> A breakdown of the regular volume bar into two parts — how much of that volume was buyer-driven versus seller-driven. Shown as a stacked bar, with buy volume on the bottom and sell volume on top.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"6px"}}>
          <strong>Why it matters:</strong> Plain volume only tells you how much happened. Buy/sell volume tells you who was more aggressive, which helps explain why some candles barely move despite heavy trading.
        </div>
        <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"8px"}}>
          <strong>How it moves:</strong> The buy and sell portions shift bar to bar based on order flow. A widening gap between the two in one direction signals growing conviction; a narrowing gap signals indecision, regardless of which way the candle itself closed.
        </div>
        <InfoBox accent={BL}>
          <strong>Why a small candle can have huge volume:</strong> Volume counts shares traded — it doesn't track how far price moved. If buy volume and sell volume are close to even, the two sides are canceling each other out, so price barely moves even though a large number of shares changed hands. Check the split whenever a candle's size doesn't seem to match its volume bar — the split usually explains it.
        </InfoBox>
        <EvenSplitVolumeChart />
        <WhatToLookFor items={[
          "A clear gap between buy and sell volume, in either direction — shows real conviction behind the move",
          "Buy and sell volume close to even despite a large total volume bar — explains why the candle barely moved",
          "The gap between buy and sell widening as price extends — supports the move continuing",
          "The gap between buy and sell narrowing as price tries to move — a sign of fading conviction, regardless of direction",
        ]} />
      </ExpandableCard>

      <SectionLabel label="Volume vs. Price Movement" sub="Why they don't always match" />
      <div style={{fontSize:"0.84rem",color:"#5a4535",lineHeight:"1.7",marginBottom:"4px"}}>
        It's possible to see a small candle with unusually high volume, and a large candle with unusually low volume. That isn't a contradiction — volume and price movement are answering two different questions. Volume counts how many shares traded. The candle's size shows how far the price actually moved, net, by the end of the period. A lot of trading can happen without price going anywhere, if buyers and sellers are evenly matched. And price can move a long way on relatively little volume, if there's barely anyone trading and most of them are on the same side.
      </div>
      <InfoBox accent={GD}>
        <strong>The buy/sell split explains it:</strong> When volume is high but the candle barely moved, the buy and sell volume are usually close to even — neither side won by much. When volume is low but the candle moved a lot, the split is usually lopsided — most of the few people trading were on the same side, so price moved with little resistance.
      </InfoBox>
      <InfoBox accent={RD}>
        A large candle on surprisingly low volume is worth treating with some caution. It suggests the move might not be backed by much real participation, and could reverse quickly once normal volume returns.
      </InfoBox>

      <NextBtn label="Confluence" onClick={onNext} />
    </div>
  );
}

function TabConfluence() {
  return (
    <div className="fu">
      <DarkCallout eyebrow="What Confluence Means">
        One of the most common beginner mistakes is spotting a single signal — price touching support, or RSI dipping low — and jumping straight to a call or put. A professional trader treats one signal as a clue, not a green light. They check whether other signals agree before acting.
      </DarkCallout>
      <InfoBox accent={OR}>
        <strong>How it works:</strong> When multiple signals point the same direction at the same time — price, volume, an indicator, even a higher timeframe — that's confluence. The more signals that agree, the more weight the read carries. Professional traders often check several timeframes and indicators before they ever consider an entry, precisely so they're not reacting to one isolated clue.
      </InfoBox>

      <SectionLabel label="Examples" sub="Tap each to expand" />
      <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
        The examples below pull from different tools covered earlier in this module — key levels, indicators, moving averages, and timeframes. Confluence isn't tied to any fixed checklist of signals; it's the general principle of checking whether multiple things agree, whichever tools happen to be relevant to what you're looking at.
      </div>

      <ExpandableCard title="Example 1: Recognizing Confluence" accent={RD}>
        <div style={{fontSize:"0.74rem",color:"#8a7560",marginBottom:"10px"}}>Same setup, three versions — no confluence, full confluence, partial confluence</div>

        <div style={{fontSize:"0.78rem",fontWeight:"700",color:RD,marginBottom:"4px"}}>No Confluence</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Price touches support — that's the only thing lining up. Volume stays flat and RSI is still in overbought territory from the prior move. A beginner sees the bounce and jumps in. A professional sees one signal with nothing backing it up.
        </div>
        <IsolatedSignalChart />
        <InfoBox accent={RD}>
          This is exactly the setup that catches beginners. The chart "looks" like a bounce, but nothing else in the picture supports it. Acting here is a guess dressed up as a trade.
        </InfoBox>

        <div style={{fontSize:"0.78rem",fontWeight:"700",color:GR,marginBottom:"4px",marginTop:"14px"}}>Full Confluence</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Same support level, same bounce — but now volume rises on the bounce candle, and RSI is turning up from oversold instead of sitting in overbought. Three independent signals, all telling the same story.
        </div>
        <ConfluentSignalChart />
        <InfoBox accent={GR}>
          This is what a professional is looking for before they even start thinking about an entry. Price, volume, and momentum are all in agreement — the case is stronger because no single signal is doing all the work.
        </InfoBox>

        <div style={{fontSize:"0.78rem",fontWeight:"700",color:GD,marginBottom:"4px",marginTop:"14px"}}>Partial Confluence</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Confluence isn't all-or-nothing. Here, price and RSI agree — the bounce lines up with RSI turning up from oversold — but volume stays flat with no real confirmation. This is a stronger picture than total isolation, but weaker than full agreement.
        </div>
        <PartialConfluenceChart />
        <InfoBox accent={GD}>
          Mixed signals like this are common. Some traders wait for the missing piece to confirm before acting. Others treat partial confluence as a smaller, more cautious position. There's no universal rule — but recognizing the gap is what matters, rather than treating 2-out-of-3 the same as 3-out-of-3.
        </InfoBox>
      </ExpandableCard>

      <ExpandableCard title="Example 2: Resistance + MACD + Trend" accent={RD}>
        <div style={{fontSize:"0.74rem",color:"#8a7560",marginBottom:"6px"}}>A bearish setup, confirmed three different ways</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Price tests resistance and gets rejected. At the same time, MACD crosses bearish, and the broader trend was already pointing down before any of this happened. Three different tools — a key level, an indicator, and the overall trend — all pointing the same direction.
        </div>
        <ResistanceMACDTrendChart />
        <InfoBox accent={RD}>
          Confluence doesn't only show up on bullish setups. A bearish case can be just as well-supported — here it would favor a put over a call, for the same reasons a bullish version would favor a call.
        </InfoBox>
      </ExpandableCard>

      <ExpandableCard title="Example 3: Breakout + Volume + Moving Average" accent={OR}>
        <div style={{fontSize:"0.74rem",color:"#8a7560",marginBottom:"6px"}}>A key level, a volume spike, and a trend tool, all agreeing</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Price breaks above resistance on a volume spike, and clears the 50 MA at the same time. The breakout alone is a signal. The volume confirms real participation behind it. The moving average confirms the broader trend is shifting too — not just one candle poking through a line.
        </div>
        <BreakoutVolumeMAChart />
        <InfoBox accent={OR}>
          Notice this example doesn't use RSI at all. Confluence is about checking whatever tools are relevant to the setup in front of you, not running through a fixed list every time.
        </InfoBox>
      </ExpandableCard>

      <ExpandableCard title="Example 4: Moving Average + MACD" accent={GR}>
        <div style={{fontSize:"0.74rem",color:"#8a7560",marginBottom:"6px"}}>Two indicators confirming each other, with no key level involved</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Price pulls back to the 50 MA and bounces off it, while MACD crosses bullish on that same candle. Neither signal needs a support or resistance line to be meaningful — two indicators agreeing with each other is its own form of confluence.
        </div>
        <MAMACDChart />
        <InfoBox accent={GR}>
          Confluence can come from a level and an indicator agreeing, like the earlier examples, or from two indicators agreeing with each other directly. Both count — what matters is that more than one independent signal is telling the same story.
        </InfoBox>
      </ExpandableCard>

      <ExpandableCard title="Example 5: Confluence Across Timeframes" accent={BL}>
        <div style={{fontSize:"0.74rem",color:"#8a7560",marginBottom:"6px"}}>Signals can agree or disagree across more than one timeframe</div>
        <div style={{fontSize:"0.82rem",color:"#5a4535",lineHeight:"1.65",marginBottom:"4px"}}>
          Confluence doesn't only mean checking different signals on a single chart. The same signal can also be checked across different timeframes. If a higher timeframe shows price bouncing off support, and a shorter timeframe you're using for timing shows that same bounce, that's confluence working across timeframes rather than just across indicators.
        </div>

        <InfoBox accent={BL}>
          <strong>When timeframes agree:</strong> A bounce off support on a higher timeframe, confirmed by the same bounce on a shorter timeframe, builds a stronger case than either timeframe would on its own.
        </InfoBox>
        <TimeframeAgreeChart />

        <InfoBox accent={RD}>
          <strong>When timeframes disagree:</strong> If a shorter timeframe shows a bounce but the higher timeframe is still in a clear downtrend, that conflict is itself useful information. It doesn't automatically mean don't trade — but it's a flag to weigh before acting, the same way a missing volume or RSI signal would be.
        </InfoBox>
        <TimeframeDisagreeChart />

        <div style={{height:"6px"}}/>
        <div style={{borderTop:`1px solid ${BD}`,paddingTop:"14px",marginTop:"6px"}}>
          <div style={{fontSize:"0.7rem",fontWeight:"700",letterSpacing:"0.1em",textTransform:"uppercase",
            color:"#8a7560",marginBottom:"8px"}}>A Final Note</div>
          <div style={{fontSize:"0.8rem",color:"#5a4535",lineHeight:"1.65"}}>
            Which specific timeframes to compare depends on the kind of trade being set up, and that's covered later in The Setup. The principle to take from this module is simpler: a signal looks stronger when more than one timeframe agrees with it, and weaker when they don't.
          </div>
        </div>
      </ExpandableCard>

    </div>
  );
}
